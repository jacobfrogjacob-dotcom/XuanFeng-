<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄封電競 | XUAN FENG ESPORTS</title>
    <style>
        :root {
            --primary: #00f2ff;
            --tiktok: #ff0050;
            --line: #00b900;
            --youtube: #ff0000;
            --discord: #5865f2;
            --bg-dark: #020202;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 模擬電競螢幕掃描線背景 */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 背景裝飾光暈 */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
        }

        .container {
            width: 90%;
            max-width: 400px;
            z-index: 20;
            text-align: center;
        }

        /* 標題設計：金屬切割感 */
        .header {
            margin-bottom: 50px;
            position: relative;
        }

        .header h1 {
            font-size: 42px;
            margin: 0;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 40%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        .brand-sub {
            display: inline-block;
            background: var(--primary);
            color: #000;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
            transform: skewX(-15deg);
        }

        /* 按鈕列表 */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 電競切角按鈕樣式 */
        .link-card {
            position: relative;
            text-decoration: none;
            padding: 20px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            color: #fff;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .link-card::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .link-card:hover::after {
            left: 100%;
        }

        .link-card:hover {
            transform: scale(1.05) skewX(-2deg);
            background: #111;
            border-color: var(--primary);
            color: #fff;
            text-shadow: 0 0 8px #fff;
        }

        /* 不同平台的強調色彩條 */
        .btn-tiktok { border-left: 5px solid var(--tiktok); }
        .btn-tiktok:hover { box-shadow: -5px 0 20px var(--tiktok); border-color: var(--tiktok); }

        .btn-line { border-left: 5px solid var(--line); }
        .btn-line:hover { box-shadow: -5px 0 20px var(--line); border-color: var(--line); }

        .btn-youtube { border-left: 5px solid var(--youtube); }
        .btn-youtube:hover { box-shadow: -5px 0 20px var(--youtube); border-color: var(--youtube); }

        .btn-discord { border-left: 5px solid var(--discord); }
        .btn-discord:hover { box-shadow: -5px 0 20px var(--discord); border-color: var(--discord); }

        /* 裝飾性小細節 */
        .ui-decoration {
            font-size: 10px;
            color: #444;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 50px;
            font-size: 10px;
            color: #333;
            letter-spacing: 5px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="header">
            <h1>玄封電競</h1>
            <div class="brand-sub">玄封電競 // XF_ONLINE</div>
        </div>

        <div class="links-group">
            <div class="ui-decoration"><span>01</span><span>Network</span></div>
            <a href="https://www.tiktok.com/@xuenfeng_xu666_?_r=1" class="link-card btn-tiktok" target="_blank">TikTok 直播中心</a>
            
            <div class="ui-decoration"><span>02</span><span>Social</span></div>
            <a href="https://lin.ee/rTNT2B6" class="link-card btn-line" target="_blank">官方Line帳號</a>
            
            <div class="ui-decoration"><span>03</span><span>Video</span></div>
            <a href="https://youtube.com/@xfg-mtd?si=WVPbE8pA1G5B-Unt" class="link-card btn-youtube" target="_blank">YouTube 官方帳號</a>
            
            <div class="ui-decoration"><span>04</span><span>Voice</span></div>
            <a href="https://discord.gg/vCcFpKuzR" class="link-card btn-discord" target="_blank">Discord反饋</a>
        </div>

        <div class="footer">
            XF ESPORTS PROTOCOL v4.0.2
        </div>
    </div>

</body>
</html>
